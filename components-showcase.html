  <script>tailwind.config = { darkMode: 'class' }</script>
  <script>
    (function() {
      const stored = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.classList.add(stored || (prefersDark ? 'dark' : 'light'));
    })();
  </script>
  <style>
    .comp-section { scroll-margin-top: 5rem; }
    .comp-section .comp-header { border-left: 4px solid rgb(99 102 231); padding-left: 1rem; }
    .comp-section .comp-desc { max-width: 42rem; }
    .variant-card { background: rgb(248 250 252); border: 1px solid rgb(226 232 240); border-radius: 0.75rem; padding: 1.5rem; transition: box-shadow 0.2s; }
    .variant-card:hover { box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
    .dark .variant-card { background: rgb(15 23 42 / 0.5); border-color: rgb(51 65 85); }
    .dark .variant-card:hover { box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.2); }
    .variant-label { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em; color: rgb(100 116 139); margin-bottom: 0.75rem; }
    .dark .variant-label { color: rgb(148 163 184); }
    .variant-desc { font-size: 0.8125rem; color: rgb(71 85 105); margin-bottom: 1rem; line-height: 1.5; }
    .dark .variant-desc { color: rgb(148 163 184); }
    .demo-area { background: white; border-radius: 0.5rem; padding: 1.25rem; border: 1px solid rgb(226 232 240); }
    .dark .demo-area { background: rgb(30 41 59); border-color: rgb(51 65 85); }
    .comp-caption { font-size: 0.75rem; line-height: 1.6; }
  </style>
</head>
