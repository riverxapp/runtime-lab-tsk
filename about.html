<header class="sticky top-0 z-10 border-b border-gray-300 bg-white/70 backdrop-blur-md dark:border-gray-700 dark:bg-gray-900/70">
  <div class="container header-inner flex flex-wrap items-center justify-between gap-4 py-5">
    <a href="index.html" class="brand focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500">Chirag Dodiya</a>
    <button id="nav-toggle" aria-controls="primary-navigation" aria-expanded="false" class="md:hidden focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500" aria-label="Toggle menu">
      <svg class="h-6 w-6 fill-current text-gray-700 dark:text-gray-300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <nav id="primary-navigation" aria-label="Primary navigation" class="hidden w-full md:flex md:w-auto md:items-center md:justify-end md:gap-6" role="navigation">
      <a href="index.html" class="text-gray-600 hover:text-blue-600 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500">Home</a>
      <a href="#about" class="text-gray-600 hover:text-blue-600 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500">About</a>
      <a href="#skills" class="text-gray-600 hover:text-blue-600 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500">Skills</a>
      <a href="#contact" class="text-gray-600 hover:text-blue-600 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500">Contact</a>
    </nav>
  </div>
  <script>
    const navToggle = document.getElementById('nav-toggle');
    const primaryNav = document.getElementById('primary-navigation');
    navToggle.addEventListener('click', () => {
      const expanded = navToggle.getAttribute('aria-expanded') === 'true' || false;
      navToggle.setAttribute('aria-expanded', !expanded);
      primaryNav.classList.toggle('hidden');
    });
  </script>
</header>
